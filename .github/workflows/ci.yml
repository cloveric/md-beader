name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: md-bider-windows-x64
            artifact_path: target/release/md-bider.exe
          - os: macos-latest
            artifact_name: md-bider-macos
            artifact_path: target/release/md-bider
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
